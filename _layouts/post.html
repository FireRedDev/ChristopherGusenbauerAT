---
layout: default
---
<article class="post-article">
    <header class="post-article-head">
        <p class="post-card-meta">{% for cat in page.categories %}<a class="post-card-tag" href="{{ cat | downcase | prepend: '/blog/' | append: '/' | relative_url }}">{{ cat }}</a>{% endfor %}<time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%d.%m.%Y" }}</time></p>
        <h1>{{ page.title }}</h1>
    </header>
    {% if page.coverImage %}
    <div class="post-article-cover"><img src="{{ page.coverImage | relative_url }}" alt=""></div>
    {% endif %}
    <div class="post-article-body">
{{ content }}
    </div>
    <footer class="post-article-foot">
        <a class="btn btn--sunset" href="{{ '/blog/' | relative_url }}">&larr; Zurück zum Blog</a>
    </footer>
</article>
