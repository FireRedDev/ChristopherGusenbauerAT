---
layout: default
---
<article class="container">
    <header class="post-hero">
        <p class="post-card-meta">
            {% if page.categories.size > 0 %}<span class="post-card-tag">{{ page.categories | first }}</span>{% endif %}
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d.%m.%Y" }}</time>
        </p>
        <h1>{{ page.title }}</h1>
    </header>
    {% if page.coverImage %}
    <figure class="post-cover">
        <img src="{{ page.coverImage | relative_url }}" alt="">
    </figure>
    {% endif %}
    <div class="prose">
        {{ content }}
    </div>
    <footer class="post-footer">
        <a class="btn btn--ghost" href="/blog/">&larr; Alle Beiträge</a>
        <a class="btn btn--ghost" href="/#contact">Schreib mir</a>
    </footer>
</article>
